<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyberdive — Global Market Core</title>

  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/market.css" />
</head>
<body class="dark">

<header class="site-header">
  <div class="logo">KYBERDIVE</div>
  <nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="market.html" class="active">Market</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main class="market-core">

  <!-- SECTOR SELECTOR -->
  <section class="sector-selector">
    <button class="sector-node active" data-sector="energy">Energy</button>
    <button class="sector-node" data-sector="ai">AI / Cloud</button>
    <button class="sector-node" data-sector="defense">Defense</button>
  </section>

  <!-- METRICS HUD -->
  <section class="metrics">
    <div class="metric">
      <label>Dominance</label>
      <span id="metric-dominance">—</span>
    </div>

    <div class="metric">
      <label>Momentum</label>
      <span id="metric-momentum">—</span>
    </div>

    <div class="metric">
      <label>Volatility</label>
      <span id="metric-volatility">—</span>
    </div>
  </section>

  <!-- CHARTS -->
  <section class="charts">
    <div class="chart-box">
      <h4>Sector Dominance</h4>
      <canvas id="dominanceChart"></canvas>
    </div>

    <div class="chart-box">
      <h4>Momentum Flow</h4>
      <canvas id="momentumChart"></canvas>
    </div>
  </section>

  <!-- AI INSIGHT PANEL -->
  <section class="insight-panel">
    <div id="ai-insight">
      <h3>Sector Insight</h3>
      <p>Select a sector to view intelligence.</p>
    </div>
  </section>

</main>

<footer class="site-footer">
  <p>© Kyberdive — Market intelligence through sectors.</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="assets/js/data.mock.js"></script>
<script src="assets/js/insights.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
