<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyberdive — Global Market Core</title>

  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/market.css" />
</head>
<body class="dark">

<header class="site-header">
  <div class="logo">KYBERDIVE</div>
  <nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="market.html" class="active">Market</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main class="market-core">

  <!-- SECTOR SELECTOR -->
  <section class="sector-bar">
    <button class="sector-node active" data-sector="energy">Energy</button>
    <button class="sector-node" data-sector="technology">AI / Cloud</button>
    <button class="sector-node" data-sector="defense">Defense</button>
    <button class="sector-node" data-sector="finance">Finance</button>
  </section>

  <!-- METRICS HUD -->
  <section class="metrics-hud">
    <div class="metric">
      <span class="label">Sentiment</span>
      <span id="metric-dominance">–</span>
    </div>
    <div class="metric">
      <span class="label">Volatility</span>
      <span id="metric-volatility">–</span>
    </div>
    <div class="metric">
      <span class="label">Momentum</span>
      <span id="metric-momentum">–</span>
    </div>
  </section>

  <!-- AI INSIGHT PANEL -->
  <section id="ai-insight" class="insight-panel">
    Loading insight…
  </section>

</main>

<!-- JS -->
<script src="assets/js/data.mock.js"></script>
<script src="assets/js/insights.js"></script>
<script src="assets/js/regime.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
