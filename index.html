<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kyberdive — Market Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Styles -->
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <!-- ===============================
       HEADER
  ================================ -->
  <header class="top-bar">
    <h1>Kyberdive</h1>
    <p class="tagline">Crypto as a reflection of real-world forces</p>
  </header>

  <!-- ===============================
       SECTOR SELECTOR
  ================================ -->
  <section class="sectors">
    <div class="sector-node active" data-sector="energy">Energy</div>
    <div class="sector-node" data-sector="ai">AI</div>
    <div class="sector-node" data-sector="defense">Defense</div>
    <div class="sector-node" data-sector="infrastructure">Infrastructure</div>
  </section>

  <!-- ===============================
       METRICS HUD
  ================================ -->
  <section class="metrics">
    <div class="metric">
      <span class="label">Dominance</span>
      <span id="metric-dominance">–</span>
    </div>
    <div class="metric">
      <span class="label">Volatility</span>
      <span id="metric-volatility">–</span>
    </div>
    <div class="metric">
      <span class="label">Momentum</span>
      <span id="metric-momentum">–</span>
    </div>
  </section>

  <!-- ===============================
       CHARTS
  ================================ -->
  <section class="charts">
    <div class="chart-card">
      <h4>Sector Dominance</h4>
      <canvas id="dominanceChart"></canvas>
    </div>

    <div class="chart-card">
      <h4>Momentum Trend</h4>
      <canvas id="momentumChart"></canvas>
    </div>
  </section>

  <!-- ===============================
       AI INSIGHT PANEL
  ================================ -->
  <section class="insight-panel" id="ai-insight">
    <!-- Injected dynamically by main.js -->
  </section>

  <!-- ===============================
       SCRIPTS (ORDER MATTERS)
  ================================ -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="data.mock.js"></script>
  <script src="charts.js"></script>
  <script src="main.js"></script>

</body>
</html>
